name: Pages

on:
  push:
    branches:
      - main # default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive  # 确保子模块正确检出

      - name: Use Node.js 20.16.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache

      - name: Install Dependencies
        run: npm install

      - name: Clean Hexo
        run: npx hexo clean

      - name: Generate static site
        run: npx hexo generate  # 使用 hexo generate 生成静态文件

      - name: Deploy to GitHub Pages
        run: npx hexo deploy  # 使用 hexo deploy 部署到 GitHub Pages
