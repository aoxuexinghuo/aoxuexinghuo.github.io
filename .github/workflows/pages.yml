name: Pages

on:
  push:
    branches:
      - main # default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive  # 确保子模块正确检出

      - name: Use Node.js 20.16.0
        uses: actions/setup-node@v4
        with:
          node-version: "20.16.0"

      - name: Cache NPM dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-cache
          restore-keys: |
            ${{ runner.OS }}-npm-cache

      - name: Ensure hexo-theme-butterfly is intact
        run: rm -rf node_modules/hexo-theme-butterfly  # 避免缓存问题

      - name: Install Dependencies
        run: npm install

      - name: Generate static site
        run: npm run build  # 使用 npm run build 生成静态文件

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public  # 上传 public 文件夹内容

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
